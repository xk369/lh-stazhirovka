services:
  caddy:
    image: caddy:2-alpine
    container_name: loft-hall-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    networks:
      - default
      - loft_app
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

networks:
  loft_app:
    external: true
    name: loft-hall-internship-unified_default

volumes:
  caddy_data:
  caddy_config:
